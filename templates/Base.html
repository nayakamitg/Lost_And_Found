<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
    {% block style %}{% endblock style %}
    </style>
   
</head>
<body>
    <div class="container-fluid px-0">
    <nav class="navbar navbar-expand-lg py-3" style="background-color: #2575fc;">
        <div class="container-fluid">
          <a class="navbar-brand text-light fs-2 fw-bold" href="/">LOST AND FOUND</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav px-5">
              <a class="nav-link active text-light" aria-current="page" href="/">Home</a>
              <a class="nav-link text-light" href="/add_person">Add lost person</a>
            </div>
          </div>
        </div>
      </nav>
    </div>
<div class="container-fluid">
     {% if messages %} 
    {% for message in messages %}
    <a href="/">
   <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
     <strong>Success:</strong> {{ message }}
     <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
   </div></a>
    {% endfor %}
    {% endif %}
    </div>
{% block body %}


{% endblock body %}

<footer class=" text-center flex justify-content-between flex-row-reverse" style="background-color: #2575fc;">
    <!-- Grid container -->
    <div class="container-fluid p-4 pb-0">
      <!-- Section: Social media -->
      <section class="mb-4">
        <!-- Facebook -->
        <a
        data-mdb-ripple-init
          class="btn text-white btn-floating m-1"
          style="background-color: #3b5998;"
          href="https://www.facebook.com/profile.php?id=100030246631519"
          role="button"
          ><i class="fab fa-facebook-f"></i
        ></a>
  
        <!-- Instagram -->
        <a
          data-mdb-ripple-init
          class="btn text-white btn-floating m-1"
          style="background-color: #ac2bac;"
          href="https://www.instagram.com/amit_kumar37_?igsh=MTV2Z2dxazZxeW1tNw=="
          role="button"
          ><i class="fab fa-instagram"></i
        ></a>
  
        <!-- Linkedin -->
        <a
          data-mdb-ripple-init
          class="btn text-white btn-floating m-1"
          style="background-color: #0082ca;"
          href="https://www.linkedin.com/in/amit-kumar37/"
          role="button"
          ><i class="fab fa-linkedin-in"></i
        ></a>
        <!-- Github -->
        <a
          data-mdb-ripple-init
          class="btn text-white btn-floating m-1"
          style="background-color: #333333;"
          href="https://github.com/nayakamitg"
          role="button"
          ><i class="fab fa-github"></i
        ></a>
      </section>
      <!-- Section: Social media -->
    </div>
    <!-- Grid container -->
  
    <!-- Copyright -->
    <div class="text-center container-fluid p-4 pb-0 text-light" style="width:50%">
      © 2025 Copyright:
      <a class="text-body" href="https://mdbootstrap.com/">Lost_And_Found.com</a>
    </div>
    <!-- Copyright -->
  </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js" integrity="sha512-b+nQTCdtTBIRIbraqNEwsjB6UvL3UEMkXnhzd8awtCYh0Kcsjl9uEgwVFVbhoj3uu1DO1ZMacNvLoyJJiNfcvg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    {% block scripts %}
      
    {% endblock scripts %}
  </script>
</body>
</html>
